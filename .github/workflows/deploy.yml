name: Super Admin Frontend CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      # 3. Install dependencies
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # 4. Run tests
      - name: Run tests
        run: yarn test --watchAll=false || echo "No tests"

      # 5. Build project
      - name: Build
        run: yarn build

      # 6. Upload build
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist"
          target: "/tmp"

      # 7. Deploy on VPS
      - name: Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Deploying Super Admin Frontend..."

            cd /var/www/qbox-Super-admin-panel-frontend

            echo "🧹 Cleaning old build..."
            rm -rf dist

            echo "📦 Moving new build..."
            mv /tmp/dist .

            echo "🔐 Fixing permissions..."
            chown -R www-data:www-data dist

            echo "♻ Restarting Nginx..."
            systemctl restart nginx

            echo "✅ Deployment successful!"